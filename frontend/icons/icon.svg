<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Scissors / Cut symbol - stylized -->
  <g transform="translate(256,240)">
    <!-- Film strip left -->
    <rect x="-160" y="-20" width="320" height="40" rx="8" fill="rgba(255,255,255,0.15)"/>
    <rect x="-160" y="-20" width="30" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="-120" y="-20" width="30" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="90" y="-20" width="30" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="130" y="-20" width="30" height="40" rx="4" fill="rgba(255,255,255,0.3)"/>
    <!-- Cut line -->
    <line x1="-10" y1="-80" x2="-10" y2="80" stroke="#fbbf24" stroke-width="4" stroke-dasharray="12,8"/>
    <!-- Scissors -->
    <g transform="translate(-10,-80)">
      <circle cx="-18" cy="-10" r="16" fill="none" stroke="white" stroke-width="5"/>
      <circle cx="18" cy="-10" r="16" fill="none" stroke="white" stroke-width="5"/>
      <line x1="-8" y1="4" x2="12" y2="30" stroke="white" stroke-width="5" stroke-linecap="round"/>
      <line x1="8" y1="4" x2="-12" y2="30" stroke="white" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
  <!-- AI sparkle -->
  <g transform="translate(380,120)">
    <path d="M0,-28 L6,-6 L28,0 L6,6 L0,28 L-6,6 L-28,0 L-6,-6 Z" fill="#fbbf24"/>
  </g>
  <g transform="translate(340,160)">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z" fill="#fbbf24" opacity="0.7"/>
  </g>
  <!-- "CS" text -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" fill="white" letter-spacing="8">CS</text>
</svg>
